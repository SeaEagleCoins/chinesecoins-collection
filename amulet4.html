<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2 Final//EN">
<HTML>
<HEAD>

<TITLE>Chinese amulet charm sales catalog - Pg 4</TITLE>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #333;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .logo {
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
        }

        .navbar .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        .navbar .nav-links a:hover {
            color: #4CAF50;
        }

        /* Slider Container */
        .slider-container {
            max-width: 500px;
            margin: 25px auto;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .slider {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .slide-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        /* Navigation Buttons */
        .prev-btn, .next-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 24px;
            border-radius: 5px;
            transition: background 0.3s;
            z-index: 10;
        }

        .prev-btn {
            left: 15px;
        }

        .next-btn {
            right: 15px;
        }

        .prev-btn:hover, .next-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        /* Dots Navigation */
        .dots-container {
            text-align: center;
            padding: 15px;
            background: #333;
        }

        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin: 0 5px;
            background: #bbb;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }

        .dot.active {
            background: #4CAF50;
        }

        .dot:hover {
            background: #888;
        }

        /* Content Section */
        .content {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
            text-align: center;
        }

        .content h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .content p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        
        <a href="#" class="logo">Chinese Amulets & Charms - Pg 1</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="mailto:&#101;&#110;&#113;&#117;&#105;&#114;&#121;&#64;&#115;&#101;
&#97;&#101;&#97;&#103;&#108;&#101;&#99;&#111;&#105;&#110;
&#46;&#99;&#111;&#109;?subject=Enquiries">Email Us</a></li>
        </ul>
        
    </nav>

    <!-- Slider -->
    <div class="slider-container">
        <div class="slider" id="slider">
            <div class="slide">
                <img src="wangmang bu quan s/wang mang bu quan WM15a1 Os.JPG" alt="bu quan 1">
                <div class="slide-caption">WM15a1</div>
            </div>
            <div class="slide">
                <img src="wangmang bu quan s/wang mang bu quan WM15a2 Os.JPG" alt="bu quan 2">
                <div class="slide-caption">WM15a2</div>
            </div>
            <div class="slide">
                <img src="wangmang bu quan s/wang mang bu quan WM15a3 Os.JPG" alt="bu quan 3">
                <div class="slide-caption">WM15a3</div>
            </div>
            <div class="slide">
                <img src="wangmang bu quan s/wang mang bu quan WM15a4 Os.JPG" alt="bu quan 4">
                <div class="slide-caption">WM15a4</div>
            </div>
        </div>

        <!-- Navigation Arrows -->
        <button class="prev-btn" onclick="changeSlide(-1)">&#10094;</button>
        <button class="next-btn" onclick="changeSlide(1)">&#10095;</button>

        <!-- Dots -->
        <div class="dots-container" id="dotsContainer"></div>
    </div>

    <!-- Optional Content -->
    <div class="content">
     
        <p>Use the arrows or dots below to navigate through the images. 
        Each slide features a unique image with a caption.</p>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        const dotsContainer = document.getElementById('dotsContainer');

        // Create dots
        function createDots() {
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('span');
                dot.classList.add('dot');
                dot.setAttribute('onclick', goToSlide(${i}));
                dotsContainer.appendChild(dot);
            }
        }

        // Update slider position
        function updateSlider() {
            const slider = document.getElementById('slider');
            slider.style.transform = translateX(-${currentSlide * 100}%);
            
            // Update dots
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        // Change slide
        function changeSlide(direction) {
            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            updateSlider();
        }

        // Go to specific slide
        function goToSlide(slideIndex) {
            currentSlide = slideIndex;
            updateSlider();
        }

        // Initialize slider
        createDots();
        updateSlider();

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                changeSlide(-1);
            } else if (e.key === 'ArrowRight') {
                changeSlide(1);
            }
        });
    </script>
</body>
</html>
